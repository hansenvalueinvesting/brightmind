<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friends — BrightMind</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrightMind">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html"><img class="brand-logo" src="assets/brand-mark.png" alt="">BrightMind<span class="dot">.</span></a>
  <div class="nav">
    <span class="user-chip" id="user-chip"><span class="user-name"></span><span class="user-role"></span></span>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-controls="nav-menu" aria-expanded="false" onclick="toggleNav(event)">
      <span class="nav-toggle-bar"></span><span class="nav-toggle-bar"></span><span class="nav-toggle-bar"></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="dashboard.html">Home</a>
      <a href="log.html">Log</a>
      <a href="insights.html">Insights</a>
      <a href="training.html">Training</a>
      <a href="friends.html" id="nav-friends" class="active">Friends</a>
      <a href="team.html" id="nav-team" class="section-hidden">Team</a>
      <a href="coach.html" id="nav-coach" class="section-hidden">Coach Dashboard</a>
      <a href="parent.html" id="nav-parent" class="section-hidden">Parent Dashboard</a>
      <a href="settings.html">Settings</a>
      <button onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

<div class="app-wrap">
  <h1 class="page-title">Friends</h1>
  <div class="page-sub" id="page-sub"></div>

  <!-- ADD FRIEND -->
  <div class="panel">
    <div class="panel-title">Add a friend</div>
    <div class="add-row">
      <input type="email" id="friend-email" placeholder="friend@example.com" autocomplete="off">
      <button class="btn" id="addBtn" onclick="addFriend()" style="width:auto;">Send request</button>
    </div>
    <div class="msg" id="add-msg"></div>
  </div>

  <!-- REQUESTS (hidden until there are pending ones) -->
  <div class="panel section-hidden" id="requests-panel">
    <div class="panel-title">Friend requests</div>
    <div id="requests"></div>
  </div>

  <!-- FRIENDS LIST -->
  <div class="panel">
    <div class="panel-title">Your friends · <span id="friend-count">0</span></div>
    <div id="friends"><div class="hint">Loading…</div></div>
  </div>

  <!-- COMPARE (hidden until a friend is selected) -->
  <div class="panel section-hidden" id="compare-panel">
    <div class="panel-title"><span id="compare-title">Compare stats</span></div>
    <div id="compare-summary"></div>
    <div class="detail-sub" style="margin-top:18px;">Averages · you vs. friend (all time)</div>
    <div class="chart-box tall" id="compare-box"><canvas id="compareChart"></canvas></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/supabase.js"></script>
<script src="js/nav.js"></script>
<script src="js/performance.js"></script>
<script src="js/charts.js"></script>
<script src="js/friends.js"></script>
</body>
</html>
