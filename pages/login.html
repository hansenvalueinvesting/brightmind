<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — BrightMind</title>
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png">
<link rel="icon" href="../assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<link rel="manifest" href="../manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrightMind">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="panel" style="width:100%; max-width:400px;">
    <div class="brand brand-auth" style="margin-bottom:6px; font-size:22px;">
      <img class="brand-logo" src="../assets/brand-mark.png" alt="">BrightMind<span class="dot">.</span>
    </div>
    <p class="hint" style="text-align:center; margin-bottom:22px;">Log training, mind, and recovery in under 2 minutes.</p>

    <div class="tabs">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Log in</div>
      <div class="tab" id="tab-signup" onclick="switchTab('signup')">Sign up</div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <!-- Signup-only fields -->
    <div id="signup-fields" class="section-hidden">
      <div class="field">
        <label for="role">Role</label>
        <select id="role">
          <option value="player">Player</option>
          <option value="coach">Coach</option>
          <option value="parent">Parent</option>
        </select>
      </div>
      <label class="consent" id="consentBox" for="consent">
        <input type="checkbox" id="consent">
        <span>
          <span class="consent-label">Consent Agreement</span>
          I agree that the data I enter will be stored and used for app features.
        </span>
      </label>
    </div>

    <button class="btn" id="submitBtn" onclick="submitAuth()">Log in</button>
    <p class="hint" style="text-align:center; margin-top:12px;">
      <a href="#" id="forgotLink" onclick="sendReset(); return false;"
         style="color:var(--amber); text-decoration:none;">Forgot password?</a>
    </p>
    <div class="msg" id="msg"></div>

    <p class="hint" style="text-align:center; margin-top:18px;">
      <a href="../index.html" style="color:var(--ink-dim);">← Back to home</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
