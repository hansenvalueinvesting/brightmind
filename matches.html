<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matches — BrightMind</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrightMind">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html"><img class="brand-logo" src="assets/brand-mark.png" alt="">BrightMind<span class="dot">.</span></a>
  <div class="nav">
    <span class="user-chip" id="user-chip"><span class="user-name"></span><span class="user-role"></span></span>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu" aria-controls="nav-menu" aria-expanded="false" onclick="toggleNav(event)">
      <span class="nav-toggle-bar"></span><span class="nav-toggle-bar"></span><span class="nav-toggle-bar"></span>
    </button>
    <div class="nav-menu" id="nav-menu">
      <a href="dashboard.html">Home</a>
      <a href="log.html">Log</a>
      <a href="insights.html">Insights</a>
      <a href="matches.html" class="active">Matches</a>
      <a href="training.html">Training</a>
      <a href="friends.html" id="nav-friends" class="section-hidden">Friends</a>
      <a href="team.html" id="nav-team" class="section-hidden">Team</a>
      <a href="coach.html" id="nav-coach" class="section-hidden">Coach Dashboard</a>
      <a href="parent.html" id="nav-parent" class="section-hidden">Parent Dashboard</a>
      <a href="settings.html">Settings</a>
      <button onclick="signOut()">Sign out</button>
    </div>
  </div>
</div>

<div class="app-wrap">
  <h1 class="page-title">Matches</h1>
  <p class="page-sub" id="page-sub"></p>

  <div class="panel">
    <div class="panel-title">
      <span style="flex:1;">Overview</span>
      <div class="toggle" id="range-toggle">
        <button class="toggle-btn" data-range="10" onclick="setMatchRange('10')">Last 10</button>
        <button class="toggle-btn active" data-range="all" onclick="setMatchRange('all')">All</button>
      </div>
    </div>
    <div id="kpis" class="kpi-grid"><div class="empty" style="grid-column:1/-1;">Loading…</div></div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="panel-title">Results</div>
      <div class="chart-box compact" id="results-box"><canvas id="resultsChart"></canvas></div>
    </div>
    <div class="panel">
      <div class="panel-title">Performance vs. opponent rating</div>
      <div class="chart-box compact" id="opp-box"><canvas id="oppChart"></canvas></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">Performance over time</div>
    <div class="chart-box" id="perf-box"><canvas id="perfChart"></canvas></div>
  </div>

  <div class="panel">
    <div class="panel-title">Matches log</div>
    <div id="match-list"><div class="empty">Loading…</div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/supabase.js"></script>
<script src="js/nav.js"></script>
<script src="js/performance.js"></script>
<script src="js/charts.js"></script>
<script src="js/logdetail.js"></script>
<script src="js/matches.js"></script>
</body>
</html>
