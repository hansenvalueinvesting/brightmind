<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home — BrightMind</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrightMind">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <a class="brand" href="index.html"><img class="brand-logo" src="assets/brand-mark.png" alt="">BrightMind<span class="dot">.</span></a>
  <div class="nav">
    <span class="user-chip" id="user-chip"><span class="user-name"></span><span class="user-role"></span></span>
    <a href="dashboard.html" class="active">Home</a>
    <a href="log.html">Log</a>
    <a href="insights.html">Insights</a>
    <a href="friends.html" id="nav-friends" class="section-hidden">Friends</a>
    <a href="team.html" id="nav-team" class="section-hidden">Team</a>
    <a href="coach.html" id="nav-coach" class="section-hidden">Coach Dashboard</a>
    <a href="parent.html" id="nav-parent" class="section-hidden">Parent Dashboard</a>
    <a href="settings.html">Settings</a>
    <button onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="app-wrap">
  <h1 class="page-title">Home</h1>
  <div class="page-sub" id="page-sub"></div>

  <div class="panel">
    <div class="panel-title">Your coach &amp; parent</div>
    <div id="connections" class="hint">Loading…</div>
  </div>

  <div class="panel" id="sleep-panel">
    <div class="panel-title">Last night's sleep</div>
    <div id="sleep-card" class="hint">Loading…</div>
  </div>

  <div class="grid-2">
    <div class="panel streak-panel">
      <div class="streak-num"><span>🔥</span><span id="streak">0</span></div>
      <div class="streak-label">Day streak</div>
      <a href="log.html" style="display:inline-block; margin-top:16px;">Log today →</a>
    </div>
    <div class="panel">
      <div class="panel-title">
        <span style="flex:1;">Summary</span>
        <div class="toggle" id="stats-toggle">
          <button class="toggle-btn active" data-mode="week" onclick="setStatsMode('week')">This week</button>
          <button class="toggle-btn" data-mode="all" onclick="setStatsMode('all')">All time</button>
        </div>
      </div>
      <div id="week-stats" class="hint">Loading…</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">
      <span style="flex:1;">Trends</span>
      <div class="toggle" id="trend-toggle">
        <button class="toggle-btn active" data-range="30" onclick="setTrendRange('30')">30 days</button>
        <button class="toggle-btn" data-range="all" onclick="setTrendRange('all')">All time</button>
      </div>
    </div>
    <div class="chart-box tall" id="trend-box"><canvas id="trendChart"></canvas></div>
  </div>

  <div class="panel">
    <div class="panel-title">
      <span style="flex:1;">Recent entries</span>
      <div class="toggle" id="recent-toggle">
        <button class="toggle-btn active" data-mode="7" onclick="setRecentMode('7')">Last 7</button>
        <button class="toggle-btn" data-mode="all" onclick="setRecentMode('all')">All</button>
      </div>
    </div>
    <div id="recent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/supabase.js"></script>
<script src="js/charts.js"></script>
<script src="js/logdetail.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
