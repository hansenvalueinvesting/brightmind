<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings — BrightMind</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BrightMind">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="topbar">
  <div class="brand"><img class="brand-logo" src="assets/brand-mark.png" alt="">BrightMind<span class="dot">.</span></div>
  <div class="nav">
    <span class="user-chip" id="user-chip"><span class="user-name"></span><span class="user-role"></span></span>
    <a href="dashboard.html">Home</a>
    <a href="log.html">Log</a>
    <a href="insights.html">Insights</a>
    <a href="team.html" id="nav-team" class="section-hidden">Team</a>
    <a href="coach.html" id="nav-coach" class="section-hidden">Coach Dashboard</a>
    <a href="parent.html" id="nav-parent" class="section-hidden">Parent Dashboard</a>
    <a href="settings.html" class="active">Settings</a>
    <button onclick="signOut()">Sign out</button>
  </div>
</div>

<div class="app-wrap">
  <h1 class="page-title">Settings</h1>

  <!-- USERNAME -->
  <div class="panel">
    <div class="panel-title">Username</div>
    <div class="field">
      <label for="username">Display name</label>
      <input type="text" id="username" placeholder="e.g. court_warrior" autocomplete="username">
    </div>
    <button class="btn" onclick="saveUsername()">Save username</button>
    <div class="msg" id="username-msg"></div>
  </div>

  <!-- EMAIL -->
  <div class="panel">
    <div class="panel-title">Email</div>
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <button class="btn" onclick="updateEmail()">Update email</button>
    <div class="msg" id="email-msg"></div>
  </div>

  <!-- PASSWORD -->
  <div class="panel">
    <div class="panel-title">Password</div>
    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="password2">Confirm new password</label>
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" onclick="updatePassword()">Update password</button>
    <div class="msg" id="password-msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
